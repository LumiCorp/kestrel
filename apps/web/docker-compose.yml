services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: better_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${LOCAL_POSTGRES_PORT:-58432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d better_auth"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - unified_app_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${LOCAL_REDIS_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - unified_app_redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${LOCAL_MINIO_API_PORT:-59000}:9000"
      - "${LOCAL_MINIO_CONSOLE_PORT:-59001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - unified_app_minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/unified-app-storage
        mc anonymous set private local/unified-app-storage
    restart: "no"

volumes:
  unified_app_postgres_data:
  unified_app_redis_data:
  unified_app_minio_data:
