services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kestrel
      POSTGRES_PASSWORD: kestrel
      POSTGRES_DB: kestrel
    ports:
      - "${KESTREL_DB_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestrel -d kestrel"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - kestrel_postgres_data:/var/lib/postgresql/data

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.15.0
    ports:
      - "${KESTREL_JAEGER_UI_PORT:-16686}:16686"
      - "${KESTREL_OTLP_GRPC_PORT:-4317}:4317"
      - "${KESTREL_OTLP_HTTP_PORT:-4318}:4318"

volumes:
  kestrel_postgres_data:
