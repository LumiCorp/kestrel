name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-plan:
    name: Contract-proof plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      policy: ${{ steps.plan.outputs.policy }}
      runtime: ${{ steps.plan.outputs.runtime }}
      packages: ${{ steps.plan.outputs.packages }}
      web: ${{ steps.plan.outputs.web }}
      services: ${{ steps.plan.outputs.services }}
      postgres: ${{ steps.plan.outputs.postgres }}
      product: ${{ steps.plan.outputs.product }}
      desktop: ${{ steps.plan.outputs.desktop }}
      docs: ${{ steps.plan.outputs.docs }}
      package_macos: ${{ steps.plan.outputs.package_macos }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Select required proof lanes
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          arguments=(--base "${PR_BASE_SHA:-${HEAD_SHA}^}" --head "$HEAD_SHA" --github-output "$GITHUB_OUTPUT" --verify-ownership)
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            arguments+=(--full)
          fi
          node scripts/ci/plan.mjs "${arguments[@]}"

  policy:
    name: Policy and proof registry
    needs: ci-plan
    if: needs.ci-plan.outputs.policy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- policy/proof-system -- node --test scripts/ci/*.test.mjs
      - run: pnpm run ci:run-gate -- policy/governance -- pnpm run governance:check
      - run: pnpm run ci:run-gate -- policy/ruhroh-config -- pnpm run ruhroh:validate
      - run: pnpm run ci:run-gate -- policy/openapi -- pnpm run ci:openapi-drift
      - run: pnpm run ci:run-gate -- policy/routes -- pnpm run ci:route-ownership
      - run: pnpm run ci:run-gate -- policy/lint -- pnpm run ci:lint:full

  runtime:
    name: Runtime unit and integration
    needs: ci-plan
    if: needs.ci-plan.outputs.runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- runtime -- pnpm run ci:runtime

  packages:
    name: Public packages
    needs: ci-plan
    if: needs.ci-plan.outputs.packages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- packages -- pnpm run ci:packages

  web:
    name: Web unit, typecheck, and build
    needs: ci-plan
    if: needs.ci-plan.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- web -- pnpm run ci:web

  services:
    name: Hosted services
    needs: ci-plan
    if: needs.ci-plan.outputs.services == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- services -- pnpm run ci:services

  postgres:
    name: PostgreSQL
    needs: ci-plan
    if: needs.ci-plan.outputs.postgres == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: kestrel_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d kestrel_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      KESTREL_TURN_DB_TEST_URL: postgresql://postgres:postgres@127.0.0.1:5432/kestrel_ci
      KESTREL_ENVIRONMENT_DB_TEST_URL: postgresql://postgres:postgres@127.0.0.1:5432/kestrel_ci
      KESTREL_APPS_DB_TEST_URL: postgresql://postgres:postgres@127.0.0.1:5432/kestrel_ci
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- postgres -- pnpm run ci:postgres

  product:
    name: Chromium cross-surface product contracts
    needs: ci-plan
    if: needs.ci-plan.outputs.product == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:build:shared
      - run: pnpm --filter @kestrel/kestrel-one exec playwright install --with-deps chromium
      - name: Run Chromium product contracts
        env:
          CI_ARTIFACT_NAME: chromium-product-failure-${{ github.run_attempt }}
        run: pnpm run ci:run-gate -- product -- pnpm run ci:product
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chromium-product-failure-${{ github.run_attempt }}
          path: |
            apps/web/playwright-report
            apps/web/test-results
            test-results
          if-no-files-found: ignore
          retention-days: 14

  desktop:
    name: Desktop
    needs: ci-plan
    if: needs.ci-plan.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- desktop -- pnpm run ci:desktop

  docs:
    name: Documentation
    needs: ci-plan
    if: needs.ci-plan.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- docs -- pnpm run ci:docs

  package-macos:
    name: macOS packaging
    needs: ci-plan
    if: needs.ci-plan.outputs.package_macos == 'true'
    runs-on: macos-15
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: brew install postgresql@14
      - run: echo "$(brew --prefix postgresql@14)/bin" >> "$GITHUB_PATH"
      - run: pnpm run ci:run-gate -- package-macos -- pnpm run ci:package-macos

  ci-required:
    name: ci-required
    if: always()
    needs:
      [
        ci-plan,
        policy,
        runtime,
        packages,
        web,
        services,
        postgres,
        product,
        desktop,
        docs,
        package-macos,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce selected lane results
        env:
          PLAN_RESULT: ${{ needs.ci-plan.result }}
          RESULTS: ${{ toJSON(needs) }}
        shell: bash
        run: |
          [[ "$PLAN_RESULT" == "success" ]]
          node --input-type=module -e '
            const needs = JSON.parse(process.env.RESULTS);
            const selections = needs["ci-plan"].outputs;
            const failures = Object.entries(needs)
              .filter(([name]) => name !== "ci-plan")
              .filter(([name, job]) => job.result !== (selections[name.replaceAll("-", "_")] === "true" ? "success" : "skipped"));
            if (failures.length) throw new Error(failures.map(([name, job]) => `${name}: ${job.result}`).join("\n"));
            const selected = Object.entries(needs).filter(([name, job]) => name !== "ci-plan" && job.result === "success");
            console.log(`${selected.length} selected contract-proof lanes passed.`);
          '
