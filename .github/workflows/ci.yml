name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-plan:
    name: Plan required gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      plan: ${{ steps.plan.outputs.plan }}
      base: ${{ steps.plan.outputs.base }}
      head: ${{ steps.plan.outputs.head }}
      static_policy: ${{ steps.plan.outputs.static_policy }}
      runtime_unit: ${{ steps.plan.outputs.runtime_unit }}
      package_contracts: ${{ steps.plan.outputs.package_contracts }}
      web_unit: ${{ steps.plan.outputs.web_unit }}
      web_build: ${{ steps.plan.outputs.web_build }}
      service_contracts: ${{ steps.plan.outputs.service_contracts }}
      postgres_integration: ${{ steps.plan.outputs.postgres_integration }}
      kestrel_one_product: ${{ steps.plan.outputs.kestrel_one_product }}
      docs_contracts: ${{ steps.plan.outputs.docs_contracts }}
      desktop_contracts: ${{ steps.plan.outputs.desktop_contracts }}
      package_macos: ${{ steps.plan.outputs.package_macos }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up workspace
        uses: ./.github/actions/setup

      - name: Compute owned gate plan
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          base="$PR_BASE_SHA"
          full=false
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            base="$PUSH_BASE_SHA"
            full=true
          fi
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="${HEAD_SHA}^"
          fi
          arguments=(--base "$base" --head "$HEAD_SHA" --github-output "$GITHUB_OUTPUT" --verify-ownership)
          if [[ "$full" == true ]]; then
            arguments+=(--full)
          fi
          pnpm run ci:plan -- "${arguments[@]}"

  static-policy:
    name: Static policy
    needs: ci-plan
    if: needs.ci-plan.outputs.static_policy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Governance and generated-resource drift
        run: pnpm run ci:run-gate -- static-policy/governance -- pnpm run governance:check
      - name: OpenAPI drift
        run: pnpm run ci:run-gate -- static-policy/openapi -- pnpm run ci:openapi-drift
      - name: Route ownership drift
        run: pnpm run ci:run-gate -- static-policy/routes -- pnpm run ci:route-ownership
      - name: Full-repository Ultracite
        run: pnpm run ci:run-gate -- static-policy/lint -- pnpm run ci:lint:full

  runtime-unit:
    name: Runtime unit, replay, prompts, and release eval
    needs: ci-plan
    if: needs.ci-plan.outputs.runtime_unit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- runtime-unit -- pnpm run ci:runtime

  package-contracts:
    name: Public package contracts
    needs: ci-plan
    if: needs.ci-plan.outputs.package_contracts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- package-contracts -- pnpm run ci:packages

  web-unit:
    name: Kestrel One unit and API contracts
    needs: ci-plan
    if: needs.ci-plan.outputs.web_unit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- web-unit -- pnpm run ci:web

  web-build:
    name: Kestrel One production build
    needs: ci-plan
    if: needs.ci-plan.outputs.web_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- web-build -- pnpm run ci:web:build

  service-contracts:
    name: Hosted service contracts
    needs: ci-plan
    if: needs.ci-plan.outputs.service_contracts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- service-contracts -- pnpm run ci:services

  postgres-integration:
    name: PostgreSQL integration
    needs: ci-plan
    if: needs.ci-plan.outputs.postgres_integration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: kestrel_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kestrel_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      KESTREL_TURN_DB_TEST_URL: postgresql://postgres:postgres@127.0.0.1:5432/kestrel_ci
      KESTREL_ENVIRONMENT_DB_TEST_URL: postgresql://postgres:postgres@127.0.0.1:5432/kestrel_ci
      KESTREL_APPS_DB_TEST_URL: postgresql://postgres:postgres@127.0.0.1:5432/kestrel_ci
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- postgres-integration -- pnpm run ci:postgres

  kestrel-one-product:
    name: Kestrel One durable conversation product contract
    needs: ci-plan
    if: needs.ci-plan.outputs.kestrel_one_product == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      KESTREL_PRODUCT_WEBKIT: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build shared runtime packages
        run: pnpm run ci:build:shared
      - name: Install product-contract browsers
        run: |
          browsers=(chromium)
          if [[ "$KESTREL_PRODUCT_WEBKIT" == "true" ]]; then
            browsers+=(webkit)
          fi
          pnpm --filter @kestrel/kestrel-one exec playwright install --with-deps "${browsers[@]}"
      - name: Run durable conversation product contract
        env:
          CI_ARTIFACT_NAME: kestrel-one-product-failure-${{ github.run_attempt }}
        run: pnpm run ci:run-gate -- kestrel-one-product -- pnpm run ci:product
      - name: Upload failed product evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kestrel-one-product-failure-${{ github.run_attempt }}
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
          retention-days: 14

  docs-contracts:
    name: Documentation contracts
    needs: ci-plan
    if: needs.ci-plan.outputs.docs_contracts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- docs-contracts -- pnpm run ci:docs

  desktop-contracts:
    name: Desktop contracts
    needs: ci-plan
    if: needs.ci-plan.outputs.desktop_contracts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run ci:run-gate -- desktop-contracts -- pnpm run ci:desktop

  package-macos:
    name: macOS packages
    needs: ci-plan
    if: needs.ci-plan.outputs.package_macos == 'true'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Install PostgreSQL bundle source
        run: brew install postgresql@14
      - name: Add PostgreSQL to package path
        run: echo "$(brew --prefix postgresql@14)/bin" >> "$GITHUB_PATH"
      - name: Package and verify CLI
        run: pnpm run ci:run-gate -- package-macos/cli -- pnpm run cli:package && pnpm run ci:run-gate -- package-macos/cli-release -- pnpm run cli:release-check
      - name: Package and verify Desktop
        run: pnpm run ci:run-gate -- package-macos/desktop -- pnpm run desktop:package && pnpm run ci:run-gate -- package-macos/desktop-release -- pnpm run desktop:release-check

  ci-required:
    name: ci-required
    if: always()
    needs:
      - ci-plan
      - static-policy
      - runtime-unit
      - package-contracts
      - web-unit
      - web-build
      - service-contracts
      - postgres-integration
      - kestrel-one-product
      - docs-contracts
      - desktop-contracts
      - package-macos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Enforce selected gate results
        env:
          CI_PLAN_RESULT: ${{ needs.ci-plan.result }}
          CI_GATE_PLAN: ${{ needs.ci-plan.outputs.plan }}
          CI_JOB_RESULTS: ${{ toJSON(needs) }}
        run: pnpm run ci:required
